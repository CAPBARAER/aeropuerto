<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horarios de Misas</title>
    <!-- Librerías de conexión (Quita los espacios) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body{font-family:sans-serif; background:#fff; padding:20px; color:#333; text-align:center}
        .terminal{max-width:500px; margin:0 auto 20px auto; border:1px solid #eee; padding:15px; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.05); text-align:left}
        h2{margin-top:0; border-bottom:2px solid #000; padding-bottom:5px; font-size:22px}
        .misa{background:#f9f9f9; padding:12px; margin:10px 0; border-radius:5px; border-left:5px solid #000}
        .boton-cal{display:inline-block; margin-top:8px; font-size:12px; color:#555; text-decoration:none; border:1px solid #bbb; padding:5px 10px; border-radius:4px; background:#fff}
    </style>
</head>
<body>
    <h1>✝ Horarios de Misas</h1>
    <div id="listado">Conectando...</div>

    <script>
        // CONFIGURACIÓN (Quita los espacios aquí abajo)
        var config = { 
            databaseURL: "https://misas-aeropuerto-madrid-default-rtdb.europe-west1.firebasedatabase.app" 
        };
        
        firebase.initializeApp(config);
        var db = firebase.database();

        // Leer datos y actualizar la pantalla solo cuando haya cambios
        db.ref('misas').on('value', function(snapshot) {
            var datos = snapshot.val();
            var listadoDiv = document.getElementById('listado');
            listadoDiv.innerHTML = "";
            var terminales = ["T1", "T2", "T4"];
            
            terminales.forEach(function(t) {
                var html = '<div class="terminal"><h2>Terminal ' + t + '</h2>';
                var hayMisas = false;
                for (var id in datos) {
                    var m = datos[id];
                    if (m.c === t) {
                        hayMisas = true;
                        var fL = m.f.replace(/-/g,'');
                        var hL = m.h.replace(':','');
                        var linkCal = "https://google.com+" + t + "&dates=" + fL + "T" + hL + "00Z/" + fL + "T" + hL + "3000Z";
                        html += '<div class="misa"><b>' + m.h + 'h</b> - ' + m.f + '<br><a href="' + linkCal + '" target="_blank" class="boton-cal">🗓️ Añadir a mi calendario</a></div>';
                    }
                }
                if (!hayMisas) html += '<p style="color:#999; font-style:italic">No hay misas extraordinarias programadas.</p>';
                html += '</div>';
                listadoDiv.innerHTML += html;
            });
        });
    </script>
</body>
</html>
