<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✝ Horarios Misas</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body{font-family:sans-serif; background:#fff; padding:20px; color:#333; text-align:center}
        .terminal{max-width:500px; margin:0 auto 25px auto; border:1px solid #eee; padding:15px; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.05); text-align:left}
        h1{font-size:26px; margin-bottom:30px}
        h2{margin:0; font-size:20px; color:#000}
        .nombre-capilla{font-size:13px; color:#666; margin-bottom:10px; display:block; border-bottom:2px solid #000; padding-bottom:5px}
        .misa{background:#f9f9f9; padding:15px; margin:10px 0; border-radius:5px; border-left:6px solid #000}
        .hora{font-size:20px; font-weight:bold}
        .fecha{font-size:14px; color:#666; margin-left:10px}
        .obs{font-size:15px; color:#444; font-style:italic; margin-top:8px; padding-top:5px; border-top:1px solid #ddd}
    </style>
</head>
<body>
    <h1>✝ Horarios de Misas</h1>
    <div id="listado">Conectando...</div>

    <script>
        var config = { databaseURL: "https://misas-aeropuerto-madrid-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(config);
        var db = firebase.database();

        // Diccionario de nombres
        var nombres = {
            "T1": "Nuestra Señora de Loreto",
            "T2": "Nuestra Señora de Guadalupe",
            "T4": "Santiago Apóstol"
        };

        db.ref('misas').on('value', function(snapshot) {
            var datos = snapshot.val();
            var listadoDiv = document.getElementById('listado');
            listadoDiv.innerHTML = "";
            var ahora = new Date();

            ["T1", "T2", "T4"].forEach(function(t) {
                var html = '<div class="terminal"><h2>Terminal ' + t + '</h2>';
                html += '<span class="nombre-capilla">Capilla ' + nombres[t] + '</span>';
                var hayMisas = false;

                for (var id in datos) {
                    var m = datos[id];
                    var horaMisa = new Date(m.f + "T" + m.h);
                    if (m.c === t && (horaMisa.getTime() + 1800000) > ahora.getTime()) {
                        hayMisas = true;
                        html += '<div class="misa"><span class="hora">' + m.h + 'h</span><span class="fecha">' + m.f + '</span>' +
                                (m.o ? '<div class="obs">' + m.o + '</div>' : '') + '</div>';
                    }
                }
                if (!hayMisas) html += '<p style="color:#999; font-style:italic; margin:15px 0">No hay misas próximas.</p>';
                listadoDiv.innerHTML += html;
            });
        });
    </script>
</body>
</html>
